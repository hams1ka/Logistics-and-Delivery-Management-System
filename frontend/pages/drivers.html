  <meta charset="UTF-8"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
    .sidebar{width:240px;min-height:100vh;background:#1a1f36;color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
    .sidebar-brand{padding:20px 16px;border-bottom:1px solid #2e3457}
    .sidebar-brand h5{font-size:13px;font-weight:700;color:#7c83fd;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
    .sidebar-brand p{font-size:11px;color:#8892b0;margin:0}
    .sidebar-nav{padding:12px 0;flex:1}
    .nav-section-label{font-size:10px;font-weight:700;color:#4a5568;letter-spacing:1.5px;text-transform:uppercase;padding:14px 20px 6px}
    .sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#a0aec0;text-decoration:none;font-size:13.5px;transition:all .2s;border-left:3px solid transparent}
    .sidebar-nav a:hover,.sidebar-nav a.active{background:#252b4a;color:#fff;border-left-color:#7c83fd}
    .sidebar-nav a i{font-size:16px;width:20px}
    .sidebar-footer{padding:14px 20px;font-size:11px;color:#4a5568;border-top:1px solid #2e3457}
    .main{margin-left:240px;flex:1;display:flex;flex-direction:column}
    .topbar{background:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50}
    .topbar h4{font-size:16px;font-weight:700;color:#1a1f36;margin:0}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .content{padding:28px}
    .panel{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:24px;overflow:hidden}
    .panel-header{padding:16px 20px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;justify-content:space-between}
    .panel-header h6{font-size:14px;font-weight:700;color:#1a1f36;margin:0}
    .data-table{width:100%;border-collapse:collapse;font-size:13px}
    .data-table th{background:#f7f8fc;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0}
    .data-table td{padding:11px 14px;border-bottom:1px solid #f0f2f5;color:#2d3748}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tr:hover td{background:#f7f8fc}
    .btn-add{background:#7c83fd;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .btn-add:hover{background:#6366f1}
    .btn-edit{background:#dbeafe;color:#1d4ed8;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
    .btn-delete{background:#fee2e2;color:#dc2626;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;margin-left:4px}
    .search-box{padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;width:220px;color:#2d3748}
    .search-box:focus{border-color:#7c83fd}
    .no-results{padding:20px;color:#718096;font-size:13px;text-align:center}
    .highlight{background:#fef9c3;border-radius:3px;padding:0 2px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:14px;width:440px;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
    .modal-box h5{font-size:15px;font-weight:700;color:#1a1f36;margin-bottom:20px}
    .form-group{margin-bottom:14px}
    .form-group label{font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px}
    .form-group input{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none}
    .form-group input:focus{border-color:#7c83fd}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
    .btn-cancel{background:#f7f8fc;color:#4a5568;border:1px solid #e2e8f0;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer}
    .btn-save{background:#7c83fd;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer}
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1f36;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;display:none}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#7c83fd;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand"><h5>&#9650; LogiOps</h5><p>Delivery Management System</p></div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="../index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="nav-section-label">Manage</div>
    <a href="drivers.html" class="active"><i class="bi bi-person-badge"></i> Drivers</a>
    <a href="vehicles.html"><i class="bi bi-truck"></i> Vehicles</a>
    <a href="orders.html"><i class="bi bi-box-seam"></i> Orders</a>
    <a href="deliveries.html"><i class="bi bi-send"></i> Deliveries</a>
    <a href="assignments.html"><i class="bi bi-clipboard-check"></i> Assignments</a>
    <a href="locations.html"><i class="bi bi-geo-alt"></i> Locations</a>
    <a href="routes.html"><i class="bi bi-signpost-split"></i> Routes</a>
    <a href="servicehistory.html"><i class="bi bi-tools"></i> Service History</a>
    <div class="nav-section-label">Analytics</div>
    <a href="reports.html"><i class="bi bi-bar-chart-line"></i> Reports</a>
    <div class="nav-label" style="font-size:10px;font-weight:700;color:#4a5568;letter-spacing:1.5px;text-transform:uppercase;padding:14px 20px 6px">Chapter 4</div>
<a href="normalization.html"><i class="bi bi-diagram-3"></i> Normalization</a>
  </nav>
  <div class="sidebar-footer">logistics_db &nbsp;|&nbsp; MySQL</div>
</aside>

<div class="main">
  <div class="topbar">
    <h4><i class="bi bi-person-badge me-2"></i>Drivers</h4>
    <div class="topbar-right">
      <!-- ── SEARCH BOX ── -->
      <input
        class="search-box"
        type="text"
        id="search-box"
        placeholder="&#128269; Search name, phone, license..."
        oninput="searchDrivers()"
      />
      <button class="btn-add" onclick="openModal()">
        <i class="bi bi-plus-lg"></i> Add Driver
      </button>
    </div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-header">
        <h6>All Drivers</h6>
        <span id="driver-count" style="font-size:12px;color:#718096"></span>
      </div>
      <div style="padding:0">
        <table class="data-table">
          <thead>
            <tr>
              <th>Driver ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>License Number</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="drivers-tbody">
            <tr><td colspan="5" style="padding:20px;color:#a0aec0">
              <span class="spinner"></span>Loading...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h5 id="modal-title">Add New Driver</h5>
    <div class="form-group">
      <label>Driver ID</label>
      <input type="number" id="f-id" placeholder="e.g. 205"/>
    </div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="Full name"/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="f-phone" placeholder="10-digit number"/>
    </div>
    <div class="form-group">
      <label>License Number</label>
      <input type="text" id="f-license" placeholder="e.g. TN12345"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveDriver()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API      = 'http://localhost:3000';
  let allDrivers = [];   // stores full list from API
  let editingId  = null;

  // ── Load all drivers from API ──
  async function loadDrivers() {
    try {
      const res  = await fetch(`${API}/api/drivers`);
      allDrivers = await res.json();       // save full list
      renderDrivers(allDrivers);           // render all by default
    } catch {
      document.getElementById('drivers-tbody').innerHTML =
        '<tr><td colspan="5" style="padding:20px;color:#e53e3e">Could not load drivers. Is the server running?</td></tr>';
    }
  }

  // ── Render a given array of drivers into the table ──
  function renderDrivers(data) {
    document.getElementById('driver-count').textContent = `${data.length} record${data.length !== 1 ? 's' : ''}`;

    if (data.length === 0) {
      document.getElementById('drivers-tbody').innerHTML =
        '<tr><td colspan="5" class="no-results">No drivers match your search</td></tr>';
      return;
    }

    const query = document.getElementById('search-box').value.toLowerCase();

    document.getElementById('drivers-tbody').innerHTML = data.map(d => `
      <tr>
        <td>${highlight(String(d.Driver_id), query)}</td>
        <td>${highlight(d.Name,            query)}</td>
        <td>${highlight(d.Phone_no,        query)}</td>
        <td>${highlight(d.License_Number,  query)}</td>
        <td>
          <button class="btn-edit"   onclick='editDriver(${JSON.stringify(d)})'>Edit</button>
          <button class="btn-delete" onclick="deleteDriver(${d.Driver_id})">Delete</button>
        </td>
      </tr>`).join('');
  }

  // ── Search — filters allDrivers array client-side ──
  function searchDrivers() {
    const query = document.getElementById('search-box').value.toLowerCase().trim();

    // If search box is empty show everything
    if (!query) {
      renderDrivers(allDrivers);
      return;
    }

    // Filter across all searchable fields
    const filtered = allDrivers.filter(d =>
      d.Name.toLowerCase().includes(query)           ||
      d.Phone_no.toLowerCase().includes(query)       ||
      d.License_Number.toLowerCase().includes(query) ||
      String(d.Driver_id).includes(query)
    );

    renderDrivers(filtered);
  }

  // ── Highlight matched text in yellow ──
  function highlight(text, query) {
    if (!query || !text) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(escaped, 'gi'),
      match => `<span class="highlight">${match}</span>`);
  }

  // ── Modal open for ADD ──
  function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add New Driver';
    ['f-id','f-name','f-phone','f-license'].forEach(id =>
      document.getElementById(id).value = '');
    document.getElementById('f-id').disabled = false;
    document.getElementById('modal').classList.add('open');
  }

  // ── Modal close ──
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── Modal open for EDIT ──
  function editDriver(d) {
    editingId = d.Driver_id;
    document.getElementById('modal-title').textContent  = 'Edit Driver';
    document.getElementById('f-id').value      = d.Driver_id;
    document.getElementById('f-name').value    = d.Name;
    document.getElementById('f-phone').value   = d.Phone_no;
    document.getElementById('f-license').value = d.License_Number;
    document.getElementById('f-id').disabled   = true;
    document.getElementById('modal').classList.add('open');
  }

  // ── Save (POST or PUT) ──
  async function saveDriver() {
    const id      = document.getElementById('f-id').value.trim();
    const name    = document.getElementById('f-name').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const license = document.getElementById('f-license').value.trim();
    if (!name || !phone || !license) { showToast('Please fill all fields'); return; }

    const body   = { Name: name, Phone_no: phone, License_Number: license };
    const url    = editingId ? `${API}/api/drivers/${editingId}` : `${API}/api/drivers`;
    const method = editingId ? 'PUT' : 'POST';
    if (!editingId) body.Driver_id = parseInt(id);

    try {
      const res  = await fetch(url, {
        method,
        headers : { 'Content-Type': 'application/json' },
        body    : JSON.stringify(body)
      });
      const data = await res.json();
      showToast(data.message || 'Saved');
      closeModal();
      loadDrivers();
    } catch { showToast('Error saving driver'); }
  }

  // ── Delete ──
  async function deleteDriver(id) {
    if (!confirm(`Delete driver ${id}?`)) return;
    try {
      await fetch(`${API}/api/drivers/${id}`, { method: 'DELETE' });
      showToast('Driver deleted');
      loadDrivers();
    } catch { showToast('Error deleting'); }
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent   = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  // ── Clear search when Escape is pressed ──
  document.getElementById('search-box').addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('search-box').value = '';
      renderDrivers(allDrivers);
    }
  });

  loadDrivers();
</script>
</body>
</html>
